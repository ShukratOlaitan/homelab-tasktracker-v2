apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tasktracker
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ShukratOlaitan/homelab-tasktracker-v2.git
    targetRevision: main
    path: kubernetes/base

  destination:
    server: https://kubernetes.default.svc
    namespace: tasktracker

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
