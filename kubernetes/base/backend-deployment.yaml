apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasktracker-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasktracker-backend
  template:
    metadata:
      labels:
        app: tasktracker-backend
    spec:
      containers:
        - name: backend
          image: shukratolaitan/tasktracker-backend:v4
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
