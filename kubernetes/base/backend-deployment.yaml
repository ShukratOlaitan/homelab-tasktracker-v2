apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasktracker-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasktracker-backend
  template:
    metadata:
      labels:
        app: tasktracker-backend
    spec:
      containers:
        - name: backend
          image: shukratolaitan/tasktracker-backend:v1
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://postgres:password@postgres:5432/tasktracker
