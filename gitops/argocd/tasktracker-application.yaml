apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tasktracker
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ShukratOlaitan/homelab-tasktracker-v2.git
    targetRevision: main
    path: helm/tasktracker
    helm:
      releaseName: tasktracker

  destination:
    server: https://kubernetes.default.svc
    namespace: tasktracker-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
