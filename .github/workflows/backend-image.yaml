name: Build Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-image.yaml"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
	  fetch-depth: 0
 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: shukratolaitan/tasktracker-backend:${{ github.sha }}

      - name: Install yq
        uses: mikefarah/yq@v4.45.4

      - name: Update Helm backend image tag
        run: |
          yq -i '.backend.image.tag = strenv(GITHUB_SHA)' \
            helm/tasktracker/values.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/tasktracker/values.yaml

          if git diff --cached --quiet; then
            echo "No image tag change to commit"
          else
            git commit -m "Update backend image tag to ${GITHUB_SHA} [skip ci]"
            git push
          fi      
