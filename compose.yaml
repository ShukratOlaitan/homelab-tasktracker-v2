services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: tasktracker-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@postgres:5432/tasktracker
    depends_on:
      - postgres

volumes:
  postgres_data:
