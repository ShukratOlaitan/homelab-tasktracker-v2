apiVersion: v1
kind: Service

metadata:
  name: tasktracker-backend
  labels:
    app: tasktracker-backend

spec:
  selector:
    app: tasktracker-backend

  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.port }}

  type: {{ .Values.backend.service.type }}
